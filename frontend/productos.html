<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPV Ortopedia - Productos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <h1>🦴 Ortopedia</h1>
        <div>
            <span id="bienvenida"></span>
            <button class="secondary" style="width:auto; margin-left:15px" onclick="window.location.href='dashboard.html'">← Volver</button>
        </div>
    </nav>

    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2>Productos</h2>
            <button style="width:auto" onclick="abrirModal()">+ Añadir producto</button>
        </div>

        <!-- FILTRO POR MARCA -->
        <div style="margin-bottom:15px">
            <select id="filtro-marca" onchange="filtrarPorMarca()" style="padding:10px; border:1px solid #ddd; border-radius:5px; font-size:1rem">
                <option value="">Todas las marcas</option>
            </select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Marca</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Stock mínimo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-productos"></tbody>
        </table>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modal-titulo">Añadir producto</h2>
            <input type="hidden" id="producto-id">
            <div class="form-group">
                <label>Código</label>
                <input type="text" id="codigo">
            </div>
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="nombre">
            </div>
            <div class="form-group">
                <label>Marca (opcional)</label>
                <input type="text" id="marca" placeholder="Ej: Orliman, Forxa...">
            </div>
            <div class="form-group">
                <label>Precio (€)</label>
                <input type="number" id="precio" step="0.01">
            </div>
            <div class="form-group">
                <label>Stock</label>
                <input type="number" id="stock">
            </div>
            <div class="form-group">
                <label>Stock mínimo</label>
                <input type="number" id="stock_minimo">
            </div>
            <p id="modal-error" class="error"></p>
            <div style="display:flex; gap:10px; margin-top:10px">
                <button onclick="guardarProducto()">Guardar</button>
                <button class="danger" onclick="cerrarModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (!localStorage.getItem("usuario_nombre")) window.location.href = "index.html";
        document.getElementById("bienvenida").textContent = localStorage.getItem("usuario_nombre");

        async function cargarProductos(marca = null) {
            const productos = await getProductos(marca);
            renderTabla(productos);
        }

        async function cargarMarcas() {
            const res = await fetch("http://127.0.0.1:8000/productos/marcas");
            const marcas = await res.json();
            const select = document.getElementById("filtro-marca");
            select.innerHTML = '<option value="">Todas las marcas</option>';
            marcas.forEach(m => {
                select.innerHTML += `<option value="${m}">${m}</option>`;
            });
        }

        function filtrarPorMarca() {
            const marca = document.getElementById("filtro-marca").value || null;
            cargarProductos(marca);
        }

        function renderTabla(productos) {
            const tbody = document.getElementById("tabla-productos");
            tbody.innerHTML = "";
            productos.forEach(p => {
                const alerta = p.stock <= p.stock_minimo ? "⚠️" : "";
                tbody.innerHTML += `
                    <tr>
                        <td>${p.codigo}</td>
                        <td>${p.nombre}</td>
                        <td>${p.marca || '-'}</td>
                        <td>${p.precio}€</td>
                        <td>${alerta} ${p.stock}</td>
                        <td>${p.stock_minimo}</td>
                        <td>
                            <button class="secondary" style="width:auto" onclick="abrirModalEditar(${p.id}, '${p.codigo}', '${p.nombre}', ${p.precio}, ${p.stock}, ${p.stock_minimo}, '${p.marca || ''}')">Editar</button>
                            <button class="danger" style="width:auto" onclick="borrarProducto(${p.id})">Borrar</button>
                        </td>
                    </tr>`;
            });
        }

        function abrirModal() {
            document.getElementById("modal-titulo").textContent = "Añadir producto";
            document.getElementById("producto-id").value = "";
            document.getElementById("codigo").value = "";
            document.getElementById("nombre").value = "";
            document.getElementById("marca").value = "";
            document.getElementById("precio").value = "";
            document.getElementById("stock").value = "";
            document.getElementById("stock_minimo").value = "";
            document.getElementById("modal-error").textContent = "";
            document.getElementById("modal").classList.add("active");
        }

        function abrirModalEditar(id, codigo, nombre, precio, stock, stock_minimo, marca) {
            document.getElementById("modal-titulo").textContent = "Editar producto";
            document.getElementById("producto-id").value = id;
            document.getElementById("codigo").value = codigo;
            document.getElementById("nombre").value = nombre;
            document.getElementById("marca").value = marca;
            document.getElementById("precio").value = precio;
            document.getElementById("stock").value = stock;
            document.getElementById("stock_minimo").value = stock_minimo;
            document.getElementById("modal-error").textContent = "";
            document.getElementById("modal").classList.add("active");
        }

        function cerrarModal() {
            document.getElementById("modal").classList.remove("active");
        }

        async function guardarProducto() {
            const id = document.getElementById("producto-id").value;
            const codigo = document.getElementById("codigo").value;
            const nombre = document.getElementById("nombre").value;
            const marca = document.getElementById("marca").value || null;
            const precio = document.getElementById("precio").value;
            const stock = document.getElementById("stock").value;
            const stock_minimo = document.getElementById("stock_minimo").value;

            if (!codigo || !nombre || !precio || !stock || !stock_minimo) {
                document.getElementById("modal-error").textContent = "Rellena todos los campos obligatorios";
                return;
            }

            if (id) {
                await editarProducto_api(id, codigo, nombre, precio, stock, stock_minimo, marca);
            } else {
                await crearProducto(codigo, nombre, precio, stock, stock_minimo, marca);
            }
            cerrarModal();
            cargarProductos();
            cargarMarcas();
        }

        async function editarProducto_api(id, codigo, nombre, precio, stock, stock_minimo, marca) {
            const params = `codigo=${codigo}&nombre=${nombre}&precio=${precio}&stock=${stock}&stock_minimo=${stock_minimo}${marca ? '&marca=' + marca : ''}`;
            await fetch(`http://127.0.0.1:8000/productos/${id}?${params}`, { method: "PUT" });
        }

        async function borrarProducto(id) {
            if (confirm("¿Seguro que quieres borrar este producto?")) {
                await eliminarProducto(id);
                cargarProductos();
                cargarMarcas();
            }
        }

        cargarProductos();
        cargarMarcas();
    </script>
</body>
</html>
