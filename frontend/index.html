<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPV Ortopedia - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <h1>🦴 Ortopedia</h1>
        <h2>Iniciar sesión</h2>
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" id="nombre" placeholder="Tu nombre de usuario">
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="Tu contraseña">
        </div>
        <button onclick="iniciarSesion()">Entrar</button>
        <p id="error" class="error"></p>
    </div>

    <script src="js/api.js"></script>
    <script>
        async function iniciarSesion() {
            const nombre = document.getElementById("nombre").value;
            const password = document.getElementById("password").value;
            const res = await login(nombre, password);
            if (res.id) {
                localStorage.setItem("usuario_id", res.id);
                localStorage.setItem("usuario_nombre", nombre);
                localStorage.setItem("usuario_rol", res.rol);
                window.location.href = "dashboard.html";
            } else {
                document.getElementById("error").textContent = "Usuario o contraseña incorrectos";
            }
        }
    </script>
</body>
</html>
