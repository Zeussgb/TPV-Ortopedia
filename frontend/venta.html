<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPV Ortopedia - Historial</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <h1>🦴 Ortopedia</h1>
        <div>
            <span id="bienvenida"></span>
            <button class="secondary" style="width:auto; margin-left:15px" onclick="window.location.href='dashboard.html'">← Volver</button>
        </div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom:20px">Historial de ventas</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Total</th>
                    <th>Tipo pago</th>
                    <th>Cambio</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-ventas"></tbody>
        </table>
    </div>

    <!-- MODAL DETALLE -->
    <div class="modal" id="modal">
        <div class="modal-content" style="width:500px">
            <h2>Detalle de venta</h2>
            <div id="detalle-venta"></div>
            <button class="danger" style="margin-top:15px" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (!localStorage.getItem("usuario_nombre")) window.location.href = "index.html";
        document.getElementById("bienvenida").textContent = localStorage.getItem("usuario_nombre");

        async function cargarVentas() {
            const ventas = await getVentas();
            const tbody = document.getElementById("tabla-ventas");
            tbody.innerHTML = "";
            ventas.forEach(v => {
                const fecha = new Date(v.fecha).toLocaleString("es-ES");
                tbody.innerHTML += `
                    <tr>
                        <td>#${v.id}</td>
                        <td>${fecha}</td>
                        <td>${parseFloat(v.total).toFixed(2)}€</td>
                        <td>${v.tipo_pago}</td>
                        <td>${v.cambio ? parseFloat(v.cambio).toFixed(2) + '€' : '-'}</td>
                        <td><button class="secondary" style="width:auto" onclick="verDetalle(${v.id})">Ver detalle</button></td>
                    </tr>`;
            });
        }

        async function verDetalle(id) {
            const res = await fetch(`http://127.0.0.1:8000/ventas/${id}`);
            const data = await res.json();
            const venta = data.venta;
            const lineas = data.lineas;

            let html = `
                <p><strong>Fecha:</strong> ${new Date(venta.fecha).toLocaleString("es-ES")}</p>
                <p><strong>Tipo de pago:</strong> ${venta.tipo_pago}</p>
                <p><strong>Total:</strong> ${parseFloat(venta.total).toFixed(2)}€</p>
                ${venta.cambio ? `<p><strong>Cambio:</strong> ${parseFloat(venta.cambio).toFixed(2)}€</p>` : ''}
                <hr style="margin:15px 0">
                <h3>Productos</h3>
                <table style="margin-top:10px">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio unit.</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody>`;

            lineas.forEach(l => {
                html += `
                    <tr>
                        <td>${l.nombre} (${l.codigo})</td>
                        <td>${l.cantidad}</td>
                        <td>${parseFloat(l.precio_unitario).toFixed(2)}€</td>
                        <td>${(l.cantidad * l.precio_unitario).toFixed(2)}€</td>
                    </tr>`;
            });

            html += `</tbody></table>`;
            document.getElementById("detalle-venta").innerHTML = html;
            document.getElementById("modal").classList.add("active");
        }

        function cerrarModal() {
            document.getElementById("modal").classList.remove("active");
        }

        cargarVentas();
    </script>
</body>
</html>
